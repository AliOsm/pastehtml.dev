        self_asserted_name: يسمّي نفسه «%{name}» — هذا الاسم من ادعائه ولم يُتحقق منه.
        able_to: "سيتمكن من:"
        authorize: تفويض
        deny: رفض
      error:
        title: فشل التفويض
        eyebrow: خطأ OAuth
    errors:
      messages:
        invalid_target: يجب أن يحدد معامل resource نقطة نهاية MCP لهذا الخادم مرة واحدة بالضبط.
