<!doctype html>

<html lang="en">
  <head>
    <title>Offline — pastehtml.dev</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#fff8ec">

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        background-color: #fff8ec;
        background-image:
          radial-gradient(circle at 25% 15%, rgb(255 212 0 / 0.18), transparent 42%),
          radial-gradient(circle at 85% 80%, rgb(0 114 206 / 0.10), transparent 45%),
          radial-gradient(circle, rgb(24 18 14 / 0.07) 1px, transparent 1.4px);
        background-size: auto, auto, 12px 12px;
        color: #18120e;
        display: grid;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100dvh;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        background: #ffffff;
        border: 3px solid #18120e;
        border-radius: 0.5rem;
        box-shadow: 8px 8px 0 0 #18120e;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        max-width: 28rem;
        padding: 3rem 2rem;
        text-align: center;
      }

      img {
        width: 4rem;
        height: 4rem;
      }

      h1 {
        font-family: Impact, "Arial Black", sans-serif;
        font-size: 2rem;
        letter-spacing: 0.02em;
        text-shadow: 1.5px 1.5px 0 #fff8ec, 3px 3px 0 #e62429;
        text-transform: uppercase;
      }

      p {
        color: rgb(24 18 14 / 0.7);
      }

      a {
        color: #0072ce;
        font-weight: 600;
        text-decoration-thickness: 2px;
        text-underline-offset: 4px;
      }

      .divider {
        width: 3rem;
        border: 0;
        border-top: 3px solid rgb(24 18 14 / 0.25);
      }

      [lang="ar"] {
        letter-spacing: normal;
      }

      h1[lang="ar"] {
        font-family: "Segoe UI", Tahoma, system-ui, sans-serif;
      }
    </style>
  </head>

  <body>
    <main>
      <img src="/icon.svg" alt="" aria-hidden="true">
      <h1 lang="en" dir="ltr">You're offline!</h1>
      <p lang="en" dir="ltr">pastehtml.dev needs a connection to publish and open pages. Check your network and try again.</p>
      <hr class="divider">
      <h1 lang="ar" dir="rtl">أنت غير متصل بالإنترنت!</h1>
      <p lang="ar" dir="rtl">يحتاج pastehtml.dev إلى اتصال لنشر الصفحات وفتحها. تحقّق من شبكتك وحاول مجددًا.</p>
      <a href="/">Retry · إعادة المحاولة</a>
    </main>
  </body>
</html>
